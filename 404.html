<!-- =========================================================
     404.html
========================================================= -->

<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Page not found"
  >

  <title>404 Page Not Found — TechBlog</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <link rel="stylesheet" href="style.css">

  <script src="script.js" defer></script>

</head>

<body data-page="404">

  <div id="siteHeader"></div>

  <main>

    <section class="container not-found-page">

      <div class="not-found-illustration">

        <div class="orbit orbit-one"></div>

        <div class="orbit orbit-two"></div>

        <div class="error-number">
          404
        </div>

        <div class="lost-card">

          <i class="fa-regular fa-file-lines"></i>

          <span>
            Page not found
          </span>

        </div>

      </div>

      <div class="not-found-content">

        <span class="eyebrow">
          Something Is Missing
        </span>

        <h1>
          We couldn’t find that page.
        </h1>

        <p>
          The page may have moved, the address may be
          incorrect or the content may no longer be available.
        </p>

        <form
          id="notFoundSearch"
          class="not-found-search"
        >

          <input
            name="q"
            type="search"
            required
            placeholder="Search TechBlog..."
            aria-label="Search from 404 page"
          >

          <button
            type="submit"
            aria-label="Search"
          >
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>

        </form>

        <div class="not-found-actions">

          <a
            class="button button-primary"
            href="index.html"
          >
            <i class="fa-solid fa-house"></i>
            Go Home
          </a>

          <a
            class="button button-outline"
            href="category.html"
          >
            Browse Articles
          </a>

        </div>

      </div>

    </section>

  </main>

  <div id="siteFooter"></div>

  <div
    id="toast"
    class="toast"
    role="status"
    aria-live="polite"
  ></div>

</body>

</html>
