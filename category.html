     category.html
========================================================= -->

<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Browse TechBlog technology articles"
  >

  <title>Technology Articles — TechBlog</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >

  <link rel="stylesheet" href="style.css">

  <script src="script.js" defer></script>

</head>

<body data-page="category">

  <div id="siteHeader"></div>

  <main>

    <section class="page-banner">

      <div class="container">

        <nav class="breadcrumb breadcrumb-light">

          <a href="index.html">
            Home
          </a>

          <i class="fa-solid fa-chevron-right"></i>

          <span>
            Technology
          </span>

        </nav>

        <span class="eyebrow eyebrow-light">
          Explore Topic
        </span>

        <h1>
          Technology
        </h1>

        <p>
          Practical guides, analysis and ideas about development,
          artificial intelligence, security, SEO and modern
          digital products.
        </p>

        <div class="banner-stats">

          <span>
            <strong>48</strong>
            Articles
          </span>

          <span>
            <strong>12</strong>
            Authors
          </span>

          <span>
            <strong>125K</strong>
            Readers
          </span>

        </div>

      </div>

    </section>

    <section class="container section-space">

      <div class="category-toolbar">

        <div>

          <span class="eyebrow">
            Latest Content
          </span>

          <h2>
            Browse Articles
          </h2>

          <p id="categoryResultCount">
            Showing articles
          </p>

        </div>

        <select
          id="categoryFilter"
          aria-label="Filter articles by category"
        >

          <option value="all">
            All Categories
          </option>

          <option value="AI">
            Artificial Intelligence
          </option>

          <option value="Development">
            Development
          </option>

          <option value="SEO">
            SEO
          </option>

          <option value="Security">
            Security
          </option>

          <option value="Business">
            Business
          </option>

          <option value="Health">
            Health
          </option>

        </select>

      </div>

      <div
        id="categoryGrid"
        class="post-grid post-grid-3"
      ></div>

      <nav
        id="categoryPagination"
        class="pagination"
        aria-label="Category pagination"
      ></nav>

    </section>

  </main>

  <div id="siteFooter"></div>

  <div
    id="toast"
    class="toast"
    role="status"
    aria-live="polite"
  ></div>

</body>

</html>
